<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PS5 Radar{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
  <a href="/" class="nav-brand">🎮 PS5 Radar</a>
  <div class="nav-links">
    <a href="/" class="{{ 'active' if request.url.path == '/' }}">All Games</a>
    <a href="/new" class="{{ 'active' if request.url.path == '/new' }}">🆕 New</a>
    <a href="/library" class="{{ 'active' if request.url.path == '/library' }}">Library</a>
    <a href="/preferences" class="{{ 'active' if request.url.path == '/preferences' }}">Preferences</a>
  </div>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
